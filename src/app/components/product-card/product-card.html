<div class="card h-100 shadow-sm producto-card">
    <div class="position-relative">
        <img [src]="producto.imagen" class="card-img-top" [alt]="producto.nombre" loading="lazy">
        <span class="badge-oferta" *ngIf="producto.descuento && producto.descuento > 0">
            {{ producto.descuento }}% OFF
        </span>
    </div>
    <div class="card-body d-flex flex-column">
        <h5 class="card-title">{{ producto.nombre }}</h5>
        <p class="card-text">{{ producto.descripcion | slice:0:60 }}...</p>
        <div class="mt-auto">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <div>
                    <span class="precio-original me-2" *ngIf="producto.precioOriginal && producto.precioOriginal > 0">
                        ${{ producto.precioOriginal }}
                    </span>
                    <span [class.precio-oferta]="producto.precioOriginal && producto.precioOriginal > 0" 
                          [class.precio-normal]="!producto.precioOriginal || producto.precioOriginal === 0">
                        ${{ producto.precio }}
                    </span>
                </div>
                <span class="badge bg-success" *ngIf="producto.stock > 0">Disponible</span>
                <span class="badge bg-danger" *ngIf="producto.stock === 0">Agotado</span>
            </div>
            <button class="btn btn-primary btn-add w-100" 
                    (click)="agregarAlCarrito()"
                    [disabled]="producto.stock === 0">
                <i class="fas fa-cart-plus me-2"></i>
                {{ producto.stock > 0 ? 'Agregar' : 'No disponible' }}
            </button>
        </div>
    </div>
</div>
