<form class="d-flex" role="search" (submit)="buscar($event)">
    <input class="form-control me-2" 
           type="search" 
           placeholder="Buscar productos..." 
           aria-label="Buscar"
           [(ngModel)]="termino"
           name="termino">
    <button class="btn btn-outline-light" type="submit">
        <i class="fas fa-search"></i>
    </button>
</form>
