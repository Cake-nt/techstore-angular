<div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Cargando...</span>
    </div>
</div>

<div *ngIf="!loading && producto" class="row">
    <div class="col-md-6">
        <img [src]="producto.imagen" class="img-fluid rounded" [alt]="producto.nombre">
    </div>
    <div class="col-md-6">
        <h2>{{ producto.nombre }}</h2>
        <p class="text-muted">{{ producto.descripcion }}</p>
        
        <div class="mb-3">
            <span class="text-decoration-line-through text-muted me-2" *ngIf="producto.precioOriginal && producto.precioOriginal > 0">
                ${{ producto.precioOriginal }}
            </span>
            <span class="fs-2 fw-bold text-primary">${{ producto.precio }}</span>
            <span class="badge bg-danger ms-2" *ngIf="producto.descuento && producto.descuento > 0">
                {{ producto.descuento }}% OFF
            </span>
        </div>

        <div class="mb-3">
            <span class="badge bg-success" *ngIf="producto.stock > 0">Disponible</span>
            <span class="badge bg-danger" *ngIf="producto.stock === 0">Agotado</span>
        </div>

        <div class="mb-3">
            <label class="form-label">Cantidad</label>
            <div class="input-group" style="width: 130px;">
                <button class="btn btn-outline-secondary" (click)="decrementarCantidad()">-</button>
                <input type="number" class="form-control text-center" [(ngModel)]="cantidad" min="1">
                <button class="btn btn-outline-secondary" (click)="incrementarCantidad()">+</button>
            </div>
        </div>

        <button class="btn btn-primary btn-lg w-100" 
                (click)="agregarAlCarrito()" 
                [disabled]="producto.stock === 0">
            <i class="fas fa-cart-plus me-2"></i>
            Agregar al carrito
        </button>

        <a routerLink="/products" class="btn btn-outline-secondary w-100 mt-2">
            <i class="fas fa-arrow-left me-2"></i>Volver a productos
        </a>
    </div>
</div>
