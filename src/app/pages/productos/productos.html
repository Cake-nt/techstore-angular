<div class="row">
    <aside class="col-md-3 mb-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">
                    <i class="fas fa-sliders-h me-2"></i>Filtros
                </h5>
                
                <div class="mb-3">
                    <label class="form-label">Buscar</label>
                    <input type="text" class="form-control" 
                           placeholder="Buscar productos..."
                           [(ngModel)]="busqueda"
                           (input)="aplicarFiltros()">
                </div>

                <hr>
                <h6>Categoría</h6>
                <div class="form-check" *ngFor="let categoria of categorias">
                    <input class="form-check-input" type="radio" 
                           name="categoria" 
                           [value]="categoria"
                           [(ngModel)]="categoriaSeleccionada"
                           (change)="cambiarCategoria(categoria)">
                    <label class="form-check-label">{{ categoria | titlecase }}</label>
                </div>

                <hr>
                <h6>Precio máximo</h6>
                <div class="mb-2">
                    <input type="range" class="form-range" 
                           min="0" max="3000" step="100"
                           [(ngModel)]="precioMaximo"
                           (input)="aplicarFiltros()">
                    <div class="d-flex justify-content-between">
                        <span>$0</span>
                        <span>${{ precioMaximo }}</span>
                    </div>
                </div>

                <button class="btn btn-secondary w-100" (click)="resetearFiltros()">
                    <i class="fas fa-undo me-2"></i>Restablecer
                </button>
            </div>
        </div>
    </aside>

    <section class="col-md-9">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Nuestros Productos</h2>
            <span class="badge bg-secondary">{{ productosFiltrados.length }} productos</span>
        </div>

        <div class="row g-4">
            <div class="col-md-4 col-sm-6" *ngFor="let producto of productosFiltrados">
                <app-product-card 
                    [producto]="producto" 
                    (agregado)="onProductoAgregado($event)">
                </app-product-card>
            </div>
        </div>

        <div class="text-center py-5" *ngIf="productosFiltrados.length === 0">
            <i class="fas fa-search fa-3x text-muted mb-3"></i>
            <h4>No se encontraron productos</h4>
            <p class="text-muted">Intenta con otros términos de búsqueda</p>
        </div>
    </section>
</div>
